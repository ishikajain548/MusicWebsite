<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="images/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Music List</title>
</head>
<body>
    <div class="nav">
        <nav>
        <ul>
            <img src="images/icon.png" alt="logo" class="logo-img">
            <li><a href="index.html">Home</a></li>
            <li><a href="music.html">All Songs</a></li>
            <div class="search-container">
                <input type="text" id="search" placeholder="Search songs..">
            </div>
            <div>
                <button id="insert">Add Song</button>
            </div>
        </ul>
        </nav>
    </div>
    <div class="container">
       <div class="header">
          <h3>Title</h3>
          <h3>Artist</h3>
          <h3>View Song</h3>
          <h3>Delete</h3>
          <h3>Edit</h3>
        </div>
        <div id="song-list">
            
        </div>
    </div>
    
    <form id="insert-form">
        <label for="title">Add title</label>
     <input type="text" id="title" placeholder="Song Title" >
       <br><br>
       <label for="artist">Artist</label>
    <input type="text" id="artist" placeholder="Artist">
       <br><br>
       <label for="genre">Select genre</label>
    <select id="genre">
    <option>K-pop Music</option>
    <option>Bollywood Music</option>
    <option>Hip-Hop Music</option>
    <option>Pop Music</option>
    <option>Lo-Fi Music</option>
    <option>Classical Music</option>
    <option>Instrumental Music</option>
    <option>Punjabi Songs</option>
    </select>
       <br><br>
       <label for="youtubeLink">Youtube Link</label>
    <input type="text" id="youtubeLink" placeholder="YouTube Link">
         <br><br>

    <button type="submit">
        Add Song
    </button>
   </form>
    <script src="music.js"></script>
</body>
</html>
